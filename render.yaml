services:
  - type: web
    name: sshcr-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
